[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# via_ir = true  # Disabled: triggers "stack too deep" in Yul. Use false for local build/test.
via_ir = false
optimizer = true
optimizer_runs = 200
solc_version = "0.8.30"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@hashgraph/=lib/hedera-smart-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
testnet = "${HEDERA_RPC_URL}"